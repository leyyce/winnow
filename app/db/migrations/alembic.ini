# Alembic configuration file.
# Run migrations from the project root:   alembic -c app/db/migrations/alembic.ini <command>
# Or use the Makefile / Docker Compose shortcuts defined in compose.dev.yaml.
#
# DATABASE_URL is NOT set here — it is injected at runtime by env.py from
# app/core/config.py (which reads POSTGRES_* env vars).  No credentials
# must ever appear in this file.  See docs/architecture/05_database_design.md §6.

[alembic]
# Path to the migration scripts, relative to this file's directory.
script_location = .

# Jinja2 template used when generating new revision files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for the timestamp in generated file names.
timezone = UTC

# Maximum length of the slug portion of the auto-generated filename.
truncate_slug_length = 40

# Output encoding for generated migration scripts.
output_encoding = utf-8

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
